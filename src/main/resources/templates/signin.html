<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">
<head>
<meta charset="UTF-8">
<title >This is Sign in page</title>
</head>
<body>
	<section>
	<div class="container ">
		<div class="row justify-content-center">
			<div class="col-md-6 ">
				<div class="my-card">
					<div class="container text-center">
						<img src="" th:src="@{/image/register.png}" alt="" class="" style="width:80px;"/>
					</div>
					<h1 class="text-center">Register Here!!</h1>
					<form action="" th:action="@{/do-register}" method="post">
					
						<!-- your name -->
						<div class="form-group">
						    <label for="name_field">Your Name</label>
						    <input 
							    type="text" 
							    class="form-control" 
							    id="name_field"
							    aria-describedby="emailHelp"
							    placeholder="Enter here"
							    required/>
						  </div>
						  
						  <!-- your email -->
						  <div class="form-group mt-3">
						    <label for="email_field">Your Email</label>
						    <input 
						    	type="email" 
						    	class="form-control" 
						    	id="email_field"
						    	aria-describedby="emailHelp"
						    	placeholder="Enter here"
							    required/>
						  </div>
						  
						  <!-- password -->
						  <div class="form-group mt-3">
						    <label for="password_field">Your Password</label>
						    <input 
						    	type="password" 
						    	class="form-control" 
						    	id="password_field"
						    	aria-describedby="emailHelp"
						    	placeholder="Enter here"
							    required/>
						  </div>
						  <!-- user about field -->
						  <div class="form-group mt-3">
						  	<textarea placeholder="Enter something about yourself" rows="10" class="form-control"></textarea>
						  </div>
						  
						  <div class="container text-center">
						  	<button type="submit" class="btn bg-primary text-white mt-3">Submit</button>
						  	<button type="reset" class="btn btn-warning mt-3">Reset</button>
						 </div>
					</form>
				</div>
			</div>
		</div>
	</div>
		
	</section>

</body>
</html>
