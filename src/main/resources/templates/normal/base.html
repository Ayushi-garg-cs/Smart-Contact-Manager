<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" th:href="@{/css/style.css}" />
	
    <title th:text="${title}">Base html</title>
  </head>
  <body>
  	<!-- navbar -->
	    <nav class=" fixed-top navbar navbar-expand-lg bg-body-tertiary bg-primary navbar-dark">
	  <div class="container-fluid">
	    <a class="navbar-brand" href="#">Smart Contact Manager</a>
	    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
	      <span class="navbar-toggler-icon"></span>
	    </button>
	    <div class="collapse navbar-collapse" id="navbarSupportedContent">
	      <ul class="navbar-nav me-auto mb-2 mb-lg-0 text-uppercase">
	        <li class="nav-item">
	          <a class="nav-link active" aria-current="page" th:href="@{/home}" href="#">Home</a>
	        </li>
	        
	  		<li class="nav-item">
	          <a class="nav-link" href="#" ><span th:text="${user != null ? user.name : ''}"></span></a>
	        </li>
	        
	        <li class="nav-item">
	          <a class="nav-link" href="#" th:href="@{/logout}" >Logout</a>
	        </li>
	        
	      </ul>
	      
	    </div>
	  </div>
	</nav>
	<!-- end of navbar -->
	
	<!-- sidebar -->
	<div class="sidebar mt-2">
		<span onclick="toggleSidebar()" class="crossBtn">&times;</span>
		<a href="#" th:href="@{/user/index}" class="item" ><i class="fa-solid fa-house"></i>Home</a>
		<a href="#" th:href="@{/user/show-contacts/0}" class="item"><i class="fa-solid fa-address-book"></i>View Contacts</a>
		<a href="#" th:href="@{/user/add-contact}" class="item"> <i class="fa-solid fa-pencil"></i>Add Contacts</a>
		<a href="#" class="item"><i class="fa-solid fa-user"></i>Your profile</a>
		<a href="#" class="item">Settings</a>
		<a href="#" th:href="@{/logout}" class="item">Logout</a>
		<div class="divider"></div>
	</div>
	<!-- End sidebar -->
	
	<!-- content area -->
	<!-- content area -->
	<div class="content mt-5">
	
	    <i onclick="toggleSidebar()" class="fa-solid fa-bars"></i>
	
	    <div th:if="${message}" class="container mt-2">

		    <div class="alert text-center"
		         th:classappend="${'alert-' + message.type}">
		
		        <span th:text="${message.content}"></span>
		
		    </div>

		</div>
	    <div th:replace="${content}"></div>
	
	</div>
	<!-- END content -->
	
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script th:src="@{/js/script.js}"></script>
    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    -->
  </body>
</html>
